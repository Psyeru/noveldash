<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소설 통계 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        /* ══════════════════════════════════════
           1. CSS 변수 & 리셋
        ══════════════════════════════════════ */
        :root {
            --bg-base:       #0d0f14;
            --bg-card:       #141720;
            --bg-card-hover: #1a1f2e;
            --border:        #252a3a;
            --border-bright: #343d56;
            --accent-gold:   #c9a84c;
            --accent-teal:   #4bc0c0;
            --accent-rose:   #e05c7a;
            --accent-green:  #4ade80;
            --text-primary:  #e8eaf0;
            --text-secondary:#9aa3bc;
            --text-dim:      #5a6380;
            --font-display:  'Nanum Myeongjo', serif;
            --font-body:     'Noto Sans KR', sans-serif;
            --radius-sm:  6px;
            --radius-md: 12px;
            --radius-lg: 18px;
            --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: var(--font-body);
            line-height: 1.6;
            min-height: 100vh;
            background-image:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* ══════════════════════════════════════
           2. 레이아웃
        ══════════════════════════════════════ */
        .container { max-width: 1100px; margin: 0 auto; padding: 48px 28px 80px; }

        /* ══════════════════════════════════════
           3. 헤더
        ══════════════════════════════════════ */
        .header { margin-bottom: 36px; border-left: 3px solid var(--accent-gold); padding-left: 20px; }
        .header-eyebrow { font-size: 11px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent-gold); margin-bottom: 8px; }
        .header h1 { font-family: var(--font-display); font-size: clamp(24px, 4vw, 36px); font-weight: 800; color: var(--text-primary); line-height: 1.2; }
        .header p  { margin-top: 8px; font-size: 14px; color: var(--text-secondary); }

        /* ══════════════════════════════════════
           4. 상태 표시줄
        ══════════════════════════════════════ */
        .status-bar {
            display: flex; align-items: center; gap: 10px;
            padding: 13px 18px; border-radius: var(--radius-md);
            border: 1px solid var(--border); background: var(--bg-card);
            font-size: 13px; color: var(--text-secondary); margin-bottom: 28px;
        }
        .status-bar.loading { border-color: var(--accent-teal); }
        .status-bar.error   { border-color: var(--accent-rose); color: var(--accent-rose); }
        .spinner { width: 15px; height: 15px; border: 2px solid var(--border-bright); border-top-color: var(--accent-teal); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-teal); flex-shrink: 0; }
        .status-bar.error .status-dot { background: var(--accent-rose); }

        /* ══════════════════════════════════════
           5. 요약 카드 (D-1 / D-day / 증감)
        ══════════════════════════════════════ */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-bottom: 28px;
        }
        .summary-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius-md); padding: 18px 20px;
            transition: border-color var(--transition);
        }
        .summary-card:hover { border-color: var(--border-bright); }
        .summary-card .s-label {
            font-size: 10px; font-weight: 500; letter-spacing: 0.12em;
            text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px;
        }
        .summary-card .s-value {
            font-family: var(--font-display); font-size: 24px; font-weight: 700;
            color: var(--text-primary); line-height: 1.1;
        }
        .summary-card .s-sub { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
        .summary-card.c-teal  { border-color: rgba(75,192,192,0.25); }
        .summary-card.c-teal  .s-value { color: var(--accent-teal); }
        .summary-card.c-green { border-color: rgba(74,222,128,0.2); }
        .summary-card.c-green .s-value { color: var(--accent-green); }
        .summary-card.c-rose  { border-color: rgba(224,92,122,0.2); }
        .summary-card.c-rose  .s-value { color: var(--accent-rose); }

        /* ══════════════════════════════════════
           6. 기간 선택 컨트롤
        ══════════════════════════════════════ */
        .controls-row {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 20px; flex-wrap: wrap;
        }
        .date-control { display: flex; align-items: center; gap: 8px; }
        .date-control label { font-size: 12px; color: var(--text-secondary); font-weight: 500; white-space: nowrap; }
        .date-input {
            background: var(--bg-card); border: 1px solid var(--border-bright);
            border-radius: var(--radius-sm); color: var(--text-primary);
            font-family: var(--font-body); font-size: 13px; padding: 7px 10px;
            cursor: pointer; transition: border-color var(--transition);
            color-scheme: dark;
        }
        .date-input:focus { outline: none; border-color: var(--accent-teal); }
        .range-sep { color: var(--text-dim); font-size: 15px; flex-shrink: 0; }
        .preset-btns { display: flex; gap: 4px; flex-wrap: wrap; }
        .preset-btn {
            padding: 6px 12px; font-size: 11px; font-weight: 500;
            border: 1px solid var(--border); border-radius: var(--radius-sm);
            background: transparent; color: var(--text-dim);
            font-family: var(--font-body); cursor: pointer;
            transition: all var(--transition); white-space: nowrap;
        }
        .preset-btn:hover  { border-color: var(--border-bright); color: var(--text-secondary); }
        .preset-btn.active { border-color: var(--accent-teal); color: var(--accent-teal); background: rgba(75,192,192,0.07); }

        /* ══════════════════════════════════════
           7. 섹션 타이틀
        ══════════════════════════════════════ */
        .section-title {
            font-family: var(--font-display); font-size: 17px; font-weight: 700;
            color: var(--text-primary); margin-bottom: 14px;
            display: flex; align-items: center; gap: 10px;
        }
        .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        /* ══════════════════════════════════════
           8. 랭킹 카드 목록
        ══════════════════════════════════════ */
        .ranking-list { margin-bottom: 0; }

        /* 랭킹 카드 */
        .rank-card {
            display: flex; align-items: center; gap: 16px;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius-md); padding: 14px 18px;
            margin-bottom: 8px; transition: all var(--transition); cursor: default;
        }
        .rank-card:hover { border-color: var(--border-bright); background: var(--bg-card-hover); }
        .rank-card.active-card { border-color: var(--accent-teal); background: rgba(75,192,192,0.04); }

        /* 순위 번호 */
        .rank-num {
            min-width: 32px; text-align: center;
            font-family: var(--font-display); font-size: 18px; font-weight: 800;
            color: var(--text-dim); flex-shrink: 0;
        }
        .rank-num.r1 { color: var(--accent-gold); }
        .rank-num.r2 { color: #b0b8d4; }
        .rank-num.r3 { color: #c8916a; }


        /* 랭킹 정렬 헤더 바 */
        .rank-header {
            display: flex; align-items: center; gap: 16px;
            padding: 8px 18px; margin-bottom: 6px;
            font-size: 10px; font-weight: 500; letter-spacing: 0.1em;
            text-transform: uppercase; color: var(--text-dim);
        }
        .rank-header .rh-num   { min-width: 32px; flex-shrink: 0; }
        .rank-header .rh-id    { flex-shrink: 0; min-width: 70px; }
        .rank-header .rh-cover { width: 44px; flex-shrink: 0; }
        .rank-header .rh-info  { flex: 1; }
        .rank-header .rh-stats { display: flex; gap: 24px; flex-shrink: 0; }
        .rank-header .rh-stat  { min-width: 60px; text-align: right; }
        .rank-header .rh-growth { min-width: 90px; text-align: right; }
        .rank-header .rh-bar   { width: 60px; flex-shrink: 0; }
        .rank-header .rh-btn   { width: 52px; flex-shrink: 0; }

        .sort-btn {
            background: none; border: none; cursor: pointer;
            font-family: var(--font-body); font-size: 10px; font-weight: 500;
            letter-spacing: 0.1em; text-transform: uppercase;
            color: var(--text-dim); padding: 4px 6px; border-radius: 4px;
            transition: all var(--transition); white-space: nowrap;
        }
        .sort-btn:hover { color: var(--text-secondary); background: var(--border); }
        .sort-btn.active { color: var(--accent-teal); }
        .sort-arrow { margin-left: 3px; font-size: 9px; }

        /* 작품번호 클릭 링크 */
        .rank-id-col {
            flex-shrink: 0;
            font-size: 11px; font-weight: 600;
            color: var(--accent-teal);
            background: rgba(75,192,192,0.08);
            border: 1px solid rgba(75,192,192,0.18);
            border-radius: 5px;
            padding: 3px 9px;
            white-space: nowrap;
            cursor: pointer;
            text-decoration: none;
            transition: all var(--transition);
            min-width: 70px; text-align: center;
        }
        .rank-id-col:hover {
            background: rgba(75,192,192,0.18);
            border-color: var(--accent-teal);
        }


        /* 표지 이미지 */
        .cover-img {
            width: 44px; height: 60px; border-radius: 4px;
            object-fit: cover; flex-shrink: 0;
            background: var(--border); border: 1px solid var(--border-bright);
        }
        .cover-placeholder {
            width: 44px; height: 60px; border-radius: 4px; flex-shrink: 0;
            background: var(--border); border: 1px solid var(--border-bright);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: var(--text-dim);
        }

        /* 작품 정보 */
        .rank-info { flex: 1; min-width: 0; }
        .rank-title {
            font-weight: 600; font-size: 14px; color: var(--text-primary);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        /* 뷰 모드: 작품번호 탭 */
        .rank-id-badge {
            display: inline-block; font-size: 11px; color: var(--accent-teal);
            background: rgba(75,192,192,0.1); border: 1px solid rgba(75,192,192,0.2);
            border-radius: 4px; padding: 1px 7px; margin-top: 3px;
        }
        .rank-meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

        /* 수치 영역 */
        .rank-stats { display: flex; align-items: center; gap: 24px; flex-shrink: 0; }
        .rank-stat { text-align: right; }
        .rank-stat .rs-label { font-size: 10px; color: var(--text-dim); letter-spacing: 0.05em; margin-bottom: 2px; }
        .rank-stat .rs-val   { font-size: 18px; font-weight: 700; color: var(--text-primary); }

        /* 증감률 */
        .growth-badge {
            min-width: 90px; text-align: right;
            font-size: 16px; font-weight: 700; flex-shrink: 0;
        }

        /* 인라인 바 */
        .mini-bar { width: 60px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; flex-shrink: 0; }
        .mini-bar-fill { height: 100%; border-radius: 2px; }
        .mini-bar-fill.pos { background: linear-gradient(90deg,#4ade80,#22d3ee); }
        .mini-bar-fill.neg { background: linear-gradient(90deg,var(--accent-rose),#f87171); }

        /* 상세 버튼 */
        .btn-detail {
            padding: 7px 16px; border: 1px solid var(--border-bright);
            border-radius: var(--radius-sm); background: transparent;
            color: var(--text-secondary); font-family: var(--font-body);
            font-size: 12px; font-weight: 500; cursor: pointer;
            transition: all var(--transition); white-space: nowrap; flex-shrink: 0;
        }
        .btn-detail:hover  { border-color: var(--accent-teal); color: var(--accent-teal); background: rgba(75,192,192,0.06); }
        .btn-detail.active { border-color: var(--accent-teal); color: var(--bg-base); background: var(--accent-teal); }

        /* 더보기 버튼 */
        .btn-more-wrap { text-align: center; margin-top: 12px; margin-bottom: 36px; }
        .btn-more {
            padding: 10px 32px; border: 1px solid var(--border-bright);
            border-radius: var(--radius-md); background: var(--bg-card);
            color: var(--text-secondary); font-family: var(--font-body);
            font-size: 13px; font-weight: 500; cursor: pointer;
            transition: all var(--transition);
        }
        .btn-more:hover { border-color: var(--accent-teal); color: var(--accent-teal); }
        .btn-more-wrap .count-info { font-size: 12px; color: var(--text-dim); margin-top: 8px; }

        /* ══════════════════════════════════════
           9. 상세 패널
        ══════════════════════════════════════ */
        .detail-panel {
            display: none; border: 1px solid var(--border);
            border-radius: var(--radius-lg); background: var(--bg-card);
            margin-bottom: 40px; overflow: hidden;
            animation: fadeIn 0.3s ease;
        }
        .detail-panel.visible { display: block; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

        /* 상세 헤더 */
        .detail-header {
            display: flex; align-items: flex-start; gap: 20px;
            padding: 24px 28px 20px; border-bottom: 1px solid var(--border);
        }
        .detail-cover {
            width: 64px; height: 88px; border-radius: 6px;
            object-fit: cover; flex-shrink: 0;
            border: 1px solid var(--border-bright); background: var(--border);
        }
        .detail-cover-placeholder {
            width: 64px; height: 88px; border-radius: 6px; flex-shrink: 0;
            background: var(--border); border: 1px solid var(--border-bright);
            display: flex; align-items: center; justify-content: center; font-size: 26px;
        }
        .detail-title-wrap .novel-title { font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--text-primary); }
        .detail-title-wrap .novel-sub   { font-size: 12px; color: var(--text-dim); margin-top: 6px; }
        .detail-title-wrap .novel-id    { display: inline-block; font-size: 12px; color: var(--accent-teal); background: rgba(75,192,192,0.1); border: 1px solid rgba(75,192,192,0.2); border-radius: 4px; padding: 2px 8px; margin-top: 6px; }

        /* 메타 수치 */
        .detail-meta { display: flex; flex-wrap: wrap; border-bottom: 1px solid var(--border); }
        .detail-meta-item { flex: 1; min-width: 120px; padding: 14px 22px; border-right: 1px solid var(--border); }
        .detail-meta-item:last-child { border-right: none; }
        .detail-meta-item .m-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; }
        .detail-meta-item .m-value { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--text-primary); }
        .detail-meta-item .m-value.pos  { color: var(--accent-green); }
        .detail-meta-item .m-value.neg  { color: var(--accent-rose); }
        .detail-meta-item .m-value.teal { color: var(--accent-teal); }

        /* 탭 */
        .detail-tabs { display: flex; padding: 0 28px; border-bottom: 1px solid var(--border); }
        .tab-btn {
            padding: 13px 20px; font-size: 13px; font-weight: 500;
            color: var(--text-dim); background: none; border: none;
            border-bottom: 2px solid transparent; cursor: pointer;
            font-family: var(--font-body); transition: all var(--transition); margin-bottom: -1px;
        }
        .tab-btn:hover  { color: var(--text-secondary); }
        .tab-btn.active { color: var(--accent-teal); border-bottom-color: var(--accent-teal); }

        /* 탭 콘텐츠 */
        .tab-content { display: none; padding: 24px 28px; }
        .tab-content.active { display: block; }
        .chart-canvas-wrap { position: relative; height: 300px; }

        /* 일별 상세 테이블 */
        .detail-table-wrap {
            max-height: 400px; overflow-y: auto;
            border-radius: var(--radius-md); border: 1px solid var(--border);
        }
        .detail-table-wrap::-webkit-scrollbar { width: 5px; }
        .detail-table-wrap::-webkit-scrollbar-track { background: var(--bg-base); }
        .detail-table-wrap::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        thead tr { background: rgba(75,192,192,0.05); border-bottom: 1px solid var(--border-bright); position: sticky; top: 0; z-index: 1; }
        th { padding: 12px 16px; font-size: 10px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent-teal); }
        tbody tr { border-bottom: 1px solid var(--border); transition: background var(--transition); }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: var(--bg-card-hover); }
        td { padding: 11px 16px; font-size: 13px; color: var(--text-primary); }
        tbody tr.selected-date { background: rgba(75,192,192,0.06); }
        tbody tr.selected-date td { color: var(--accent-teal); }

        /* ══════════════════════════════════════
           10. 공통 유틸
        ══════════════════════════════════════ */
        .pos { color: var(--accent-green); font-weight: 700; }
        .neg { color: var(--accent-rose);  font-weight: 700; }
        .zer { color: var(--text-dim);     font-weight: 500; }
        .delta-chip { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 4px; }
        .delta-chip.pos { background: rgba(74,222,128,0.12);  color: var(--accent-green); }
        .delta-chip.neg { background: rgba(224,92,122,0.12);  color: var(--accent-rose); }
        .delta-chip.zer { background: var(--border); color: var(--text-dim); }
        .empty-state { padding: 40px 20px; color: var(--text-dim); font-size: 14px; }

        /* ══════════════════════════════════════
           11. 반응형
        ══════════════════════════════════════ */
        @media (max-width: 900px) {
            .summary-grid { grid-template-columns: repeat(2, 1fr); }
            .rank-stats { gap: 14px; }
            .rank-stat:nth-child(1), .rank-stat:nth-child(2) { display: none; }
        }
        @media (max-width: 600px) {
            .container { padding: 20px 14px 60px; }
            .summary-grid { grid-template-columns: repeat(2, 1fr); }
            .mini-bar { display: none; }
            .rank-stats { gap: 10px; }
        }

        /* ══════════════════════════════════════
           12. AI 분석 패널
        ══════════════════════════════════════ */
        .ai-panel {
            background: var(--bg-card);
            border: 1px solid rgba(124,58,237,0.3);
            border-radius: var(--radius-lg);
            margin-bottom: 28px; overflow: hidden;
        }
        .ai-panel-header {
            display: flex; align-items: center; gap: 10px;
            padding: 13px 20px;
            background: rgba(124,58,237,0.06);
            border-bottom: 1px solid rgba(124,58,237,0.15);
            cursor: pointer; user-select: none;
        }
        .ai-panel-header .ai-title { font-size: 14px; font-weight: 600; color: var(--text-primary); flex: 1; }
        .ai-panel-header .ai-badge {
            font-size: 10px; padding: 2px 8px;
            background: rgba(124,58,237,0.15); border: 1px solid rgba(124,58,237,0.3);
            border-radius: 4px; color: #a78bfa; letter-spacing: 0.05em;
        }
        .ai-panel-header .ai-toggle { font-size: 11px; color: var(--text-dim); transition: transform var(--transition); }
        .ai-panel-header .ai-toggle.open { transform: rotate(180deg); }

        .ai-panel-body { padding: 16px 20px 20px; }

        /* API 키 설정 바 */
        .ai-key-row {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 14px; margin-bottom: 14px;
            background: rgba(201,168,76,0.05);
            border: 1px solid rgba(201,168,76,0.18); border-radius: var(--radius-sm);
            font-size: 12px;
        }
        .ai-key-row.ok { background: rgba(74,222,128,0.04); border-color: rgba(74,222,128,0.18); }
        .ai-key-row label { color: var(--text-dim); flex-shrink: 0; }
        .ai-key-input {
            flex: 1; background: var(--bg-base); border: 1px solid var(--border-bright);
            border-radius: 5px; color: var(--text-primary);
            font-family: var(--font-body); font-size: 12px; padding: 6px 10px;
        }
        .ai-key-input:focus { outline: none; border-color: #7c3aed; }
        .ai-key-btn {
            padding: 6px 12px; background: rgba(124,58,237,0.12);
            border: 1px solid rgba(124,58,237,0.3); border-radius: 5px;
            color: #a78bfa; font-family: var(--font-body); font-size: 12px;
            cursor: pointer; transition: all var(--transition); white-space: nowrap;
        }
        .ai-key-btn:hover { background: rgba(124,58,237,0.22); }
        .ai-key-status { font-size: 11px; color: var(--text-dim); flex-shrink: 0; }
        .ai-key-status.ok { color: var(--accent-green); }

        /* 빠른 질문 버튼 */
        .ai-suggests { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
        .ai-sug {

<script>
/* ══════════════════════════════════════════════════
   1. 상수 & 전역 변수
══════════════════════════════════════════════════ */
const API_URL      = 'https://script.google.com/macros/s/AKfycbzRCCtKPWzmzmO8ydXVBLRqsPKBjK3zMmx7gO_su7vh7XAcJaUI-VuP7HdQ4jj3Pe9cFw/exec';
const GROQ_API_KEY = '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';   // ← Groq 키
const GROQ_MODEL   = 'llama-3.3-70b-versatile';        // 무료 모델

let rawData      = [];       // 전체 원본 데이터
let novelGroups  = null;     // 소설별 그룹 캐시 (fetchData 이후 1회만 생성)
let allStats     = [];       // 현재 기간 기준 계산된 전체 랭킹
let myChart      = null;     // Chart.js 인스턴스
let activeId     = null;     // 현재 열린 상세 패널 소설번호
let showAll      = false;    // 더보기 상태
const PAGE_SIZE  = 10;       // 기본 표시 개수
let aiFilterOn   = false;    // AI 필터 적용 여부
let currentStart = '';       // 현재 선택 시작일
let currentEnd   = '';       // 현재 선택 종료일

// 정렬 상태: key = 정렬 컬럼, dir = 'desc'|'asc'
let sortKey = 'growth';
let sortDir = 'desc';

// 이미지 필드 후보 (GAS 컬럼명이 다를 수 있으므로 순서대로 탐색)
// GAS 시트의 이미지 컬럼명 후보 — 실제 필드명이 다를 경우 여기에 추가
const IMG_KEYS = ['이미지 링크', '이미지', '표지', '표지이미지', '이미지URL', '표지URL', 'imageUrl', 'image', 'img', 'thumbnail', '썸네일', 'cover', 'coverImage'];


/* ══════════════════════════════════════════════════
   2. 상태 표시줄
══════════════════════════════════════════════════ */
function setStatus(mode, message) {
    const bar  = document.getElementById('statusBar');
    const icon = document.getElementById('statusIcon');
    const text = document.getElementById('statusText');
    bar.className    = 'status-bar ' + mode;
    text.textContent = message;
    icon.className   = (mode === 'loading') ? 'spinner' : 'status-dot';
}


/* ══════════════════════════════════════════════════
   3. 데이터 패칭
   redirect: 'follow' 는 GAS 302 리다이렉트 대응에 필수
══════════════════════════════════════════════════ */
async function fetchData() {
    setStatus('loading', '데이터를 불러오는 중입니다...');
    try {
        const res = await fetch(API_URL, { method: 'GET', redirect: 'follow' });
        if (!res.ok) throw new Error(`HTTP 오류: ${res.status}`);

        const json = await res.json();
        rawData = Array.isArray(json) ? json : (json.data || []);

        if (rawData.length === 0) {
            setStatus('error', '불러온 데이터가 없습니다.');
            return;
        }

        // 컬럼명 확인 및 정규화
        if (rawData.length > 0) {
            console.log('[컬럼 목록]', Object.keys(rawData[0]));
            console.log('[첫번째 행]', rawData[0]);
        }

        // GAS에서 이미 올바른 타입으로 변환되어 오므로 최소한의 정규화만 수행
        rawData = rawData.map(item => {
            return {
                ...item,
                // 조회수: 숫자가 아닌 값(빈문자열 등) 대비 Number 처리
                조회수:   typeof item['조회수'] === 'number'
                            ? item['조회수']
                            : Number(String(item['조회수'] || '0').replace(/,/g, '')) || 0,
                // 소설번호: 숫자로 올 수 있으므로 문자열로
                소설번호: String(item['소설번호'] || '').trim(),
                // 날짜: 이미 YYYY-MM-DD 문자열
                날짜:     String(item['날짜'] || '').trim(),
                // 플러스일자: 이미 YYYY-MM-DD 문자열 (없으면 빈문자열)
                플러스일자: String(item['플러스일자'] || '').trim(),
            };
        });

        // 디버그: 첫 행 출력
        if (rawData.length > 0) {
            console.log('[정규화 후 첫행]', JSON.stringify(rawData[0]));
        }

        // 첫 번째 row를 콘솔에 출력 → 이미지 필드명 확인용
        const sampleKeys = Object.keys(rawData[0]);
        console.log('[데이터 샘플] 컬럼 목록:', sampleKeys);
        console.log('[데이터 샘플] 첫 번째 행 전체:', rawData[0]);
        // 이미지 후보 키 중 값이 있는 것 찾아서 출력
        const foundImgKey = sampleKeys.find(k => String(rawData[0][k]||'').startsWith('http'));
        console.log('[이미지 필드]', foundImgKey ? `"${foundImgKey}" = ${rawData[0][foundImgKey]}` : '없음 — 시트에 이미지 컬럼이 없거나 필드명이 다릅니다');

        // 그룹 캐시 1회 생성 (날짜 변경 때마다 재계산 방지)
        novelGroups = groupByNovel();

        setStatus('success', `✓ 데이터 로드 완료 — 총 ${rawData.length}건`);
        loadAiKey();
        initDashboard();

    } catch (err) {
        console.error('[fetchData] 오류:', err);
        setStatus('error', `데이터 로드 실패: ${err.message}`);
    }
}


/* ══════════════════════════════════════════════════
   4. 대시보드 초기화
   - 날짜 드롭다운 생성
   - 요약 카드 / 랭킹 첫 렌더링
══════════════════════════════════════════════════ */
function initDashboard() {
    const allDates = [...new Set(rawData.map(d => normalizeDate(d.날짜)))]
        .filter(Boolean).sort();
    const minDate = allDates[0];
    const maxDate = allDates[allDates.length - 1];

    // 날짜 입력 범위 설정
    ['startDateInput','endDateInput'].forEach(id => {
        const el = document.getElementById(id);
        el.min = minDate; el.max = maxDate;
    });

    document.getElementById('summaryGrid').style.display = '';
    document.getElementById('controlsRow').style.display = '';
    document.getElementById('rankHeader').style.display  = '';

    setPreset(1); // 기본: 전일 비교
    updateSortArrows();
}

/* 프리셋 버튼 (전일/7일/30일/90일/전체) */
function setPreset(days) {
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    const btn = document.getElementById(`pBtn-${days}`);
    if (btn) btn.classList.add('active');

    const allDates = [...new Set(rawData.map(d => normalizeDate(d.날짜)))].filter(Boolean).sort();
    const maxDate  = allDates[allDates.length - 1];

    let startDate;
    if (days === 0) {
        startDate = allDates[0];
    } else {
        const endD = new Date(maxDate);
        endD.setDate(endD.getDate() - days);
        const candidate = endD.toISOString().slice(0, 10);
        // 데이터가 없는 날짜면 그 이후 첫 날짜로 대체
        startDate = allDates.find(d => d >= candidate) || allDates[0];
    }

    document.getElementById('startDateInput').value = startDate;
    document.getElementById('endDateInput').value   = maxDate;
    currentStart = startDate;
    currentEnd   = maxDate;
    onRangeChange(false);
}


/* ══════════════════════════════════════════════════
   5. 기간 변경 핸들러
══════════════════════════════════════════════════ */
function onRangeChange(resetPreset) {
    const start = document.getElementById('startDateInput').value;
    const end   = document.getElementById('endDateInput').value;
    if (!start || !end) return;

    if (start > end) {
        document.getElementById('startDateInput').value = end;
        return;
    }

    if (resetPreset) {
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    }

    currentStart = start;
    currentEnd   = end;

    // 헤더 정렬 버튼 레이블을 실제 날짜로 업데이트
    const startShort = start.slice(5); // MM-DD
    const endShort   = end.slice(5);
    const rhS = document.getElementById('rhLabelStart');
    const rhE = document.getElementById('rhLabelEnd');
    if (rhS) rhS.textContent = startShort;
    if (rhE) rhE.textContent = endShort;

    const daysDiff = Math.round((new Date(end) - new Date(start)) / 86400000);
    const label = daysDiff <= 1
        ? `📊 ${start} → ${end} (전일 대비)`
        : `📊 ${start} ~ ${end} (${daysDiff}일간 변화)`;
    document.getElementById('rankTitle').textContent = label;

    closeDetail();
    calcRangeSummary(start, end);

    if (!aiFilterOn) {
        allStats = calcRangeStats(start, end);
        showAll  = false;
        applySort();
        renderRanking();
    }
}


/* ══════════════════════════════════════════════════
   6. 기간 기준 요약 카드
══════════════════════════════════════════════════ */
function calcRangeSummary(startDate, endDate) {
    const groups = novelGroups;
    let totalEnd = 0, totalStart = 0;

    // 날짜 이하 최근값 찾기
    function nearestAt(list, date) {
        for (let i = list.length - 1; i >= 0; i--) {
            if (normalizeDate(list[i].날짜) <= date) return list[i];
        }
        return null;
    }

    for (const id in groups) {
        const list = groups[id];
        const endItem   = nearestAt(list, endDate);
        const startItem = nearestAt(list, startDate);
        if (endItem)   totalEnd   += endItem.조회수;
        if (startItem) totalStart += startItem.조회수;
    }

    const totalNovels = Object.keys(groups).length;
    const delta       = totalEnd - totalStart;
    const growthRate  = totalStart === 0 ? 0
        : parseFloat(((delta / totalStart) * 100).toFixed(2));
    const dc = delta > 0 ? 'pos' : delta < 0 ? 'neg' : '';
    const dp = delta > 0 ? '+' : '';
    const daysDiff = Math.round((new Date(endDate) - new Date(startDate)) / 86400000);
    const periodLabel = daysDiff <= 1 ? '전일 대비' : `${daysDiff}일간`;

    document.getElementById('sumNovels').textContent    = totalNovels.toLocaleString();
    document.getElementById('sumDminus1').textContent   = totalStart.toLocaleString();
    document.getElementById('labelDminus1').textContent = `시작일 (${startDate})`;
    document.getElementById('subDminus1').textContent   = '시작일 조회수 합계';
    document.getElementById('sumDday').textContent      = totalEnd.toLocaleString();
    document.getElementById('labelDday').textContent    = `종료일 (${endDate})`;
    document.getElementById('subDday').textContent      = '종료일 조회수 합계';
    document.getElementById('sumDelta').textContent     = `${dp}${delta.toLocaleString()}`;
    document.getElementById('subDelta').textContent     = `${periodLabel} 증감률 ${dp}${growthRate}%`;

    const card = document.getElementById('cardDelta');
    card.className = 'summary-card ' + (delta > 0 ? 'c-green' : delta < 0 ? 'c-rose' : '');
    document.getElementById('sumDelta').className = 's-value ' + dc;
}


/* ══════════════════════════════════════════════════
   7. 소설별 그룹화 유틸
   날짜 오름차순 정렬된 { id: [...] } 반환
══════════════════════════════════════════════════ */
function groupByNovel() {
    const groups = {};
    rawData.forEach(item => {
        const id = String(item.소설번호);
        if (!groups[id]) groups[id] = [];
        groups[id].push(item);
    });
    for (const id in groups) {
        groups[id].sort((a, b) => new Date(normalizeDate(a.날짜)) - new Date(normalizeDate(b.날짜)));
    }
    return groups;
}


/* ══════════════════════════════════════════════════
   8. 기간 기준 전체 증감 계산
   시작일~종료일 조회수 비교
══════════════════════════════════════════════════ */
function calcRangeStats(startDate, endDate) {
    const groups = novelGroups;
    const stats  = [];

    for (const id in groups) {
        const list = groups[id];

        // 종료일 이하 최근값
        let endItem = null;
        for (let i = list.length - 1; i >= 0; i--) {
            if (normalizeDate(list[i].날짜) <= endDate) { endItem = list[i]; break; }
        }
        if (!endItem) continue;

        // 시작일 이하 최근값
        let startItem = null;
        for (let i = list.length - 1; i >= 0; i--) {
            if (normalizeDate(list[i].날짜) <= startDate) { startItem = list[i]; break; }
        }
        if (!startItem) startItem = list[0];

        // 시작=종료이면 직전 데이터와 비교 (전일 대비)
        const endIdx = list.indexOf(endItem);
        if (startItem === endItem) {
            if (endIdx > 0) startItem = list[endIdx - 1];
            else continue;
        }

        const curViews  = endItem.조회수;
        const prevViews = startItem.조회수;
        const delta     = curViews - prevViews;
        const growth    = prevViews === 0 ? 0
            : parseFloat(((delta / prevViews) * 100).toFixed(2));

        stats.push({
            id, title: endItem.제목, growth, delta,
            curViews, prevViews,
            imgUrl: getImageUrl(endItem),
            history: list
        });
    }

    stats.sort((a, b) => b.growth - a.growth);
    return stats;
}


/* ══════════════════════════════════════════════════
   9. 이미지 URL 추출 유틸
   IMG_KEYS 목록에서 값이 있는 첫 번째 키 반환
══════════════════════════════════════════════════ */
function getImageUrl(item) {
    for (const key of IMG_KEYS) {
        if (item[key] && String(item[key]).trim().startsWith('http')) {
            return String(item[key]).trim();
        }
    }
    return null;
}


/* ══════════════════════════════════════════════════
   10. 랭킹 렌더링
   showAll === false → 상위 PAGE_SIZE개만 표시
   showAll === true  → 전체 표시
══════════════════════════════════════════════════ */
function renderRanking() {
    const container = document.getElementById('rankingList');
    container.innerHTML = '';

    if (allStats.length === 0) {
        container.innerHTML = '<div class="empty-state">선택한 날짜에 비교 가능한 데이터가 없습니다.</div>';
        document.getElementById('moreWrap').style.display = 'none';
        return;
    }

    // 표시할 항목 수 결정
    const displayList = showAll ? allStats : allStats.slice(0, PAGE_SIZE);

    // 인라인 바 너비 계산용 최대 절대 증감률
    const maxAbs = Math.max(...allStats.map(d => Math.abs(d.growth)), 1);

    displayList.forEach((item, index) => {
        const rank    = index + 1;
        const numCls  = rank <= 3 ? `r${rank}` : '';
        const gc      = item.growth > 0 ? 'pos' : item.growth < 0 ? 'neg' : 'zer';
        const gPrefix = item.growth > 0 ? '+' : '';
        const dc      = item.delta  > 0 ? 'pos' : item.delta  < 0 ? 'neg' : 'zer';
        const dPrefix = item.delta  > 0 ? '+' : '';
        const barPct  = (Math.abs(item.growth) / maxAbs * 100).toFixed(1);
        const barCls  = item.growth >= 0 ? 'pos' : 'neg';
        const isActive = (item.id === activeId);

        const card = document.createElement('div');
        card.className = 'rank-card' + (isActive ? ' active-card' : '');
        card.id = `card-${item.id}`;

        // 표지 이미지 or 플레이스홀더
        const coverHtml = item.imgUrl
            ? `<img class="cover-img" src="${item.imgUrl}" alt="표지" referrerpolicy="no-referrer"
                    onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
               <div class="cover-placeholder" style="display:none;">📖</div>`
            : `<div class="cover-placeholder">📖</div>`;

        // 제목 + 작품번호 항상 표시
        const infoHtml = `<div class="rank-title">${item.title}</div>
               <div class="rank-meta">${item.history.length}일 데이터</div>`;

        card.innerHTML = `
            <div class="rank-num ${numCls}">${rank}</div>
            <a class="rank-id-col" href="https://novelpia.com/novel/${item.id}" target="_blank" rel="noopener">${item.id}</a>
            ${coverHtml}
            <div class="rank-info">${infoHtml}</div>
            <div class="rank-stats">
                <div class="rank-stat">
                    <div class="rs-label">${currentStart.slice(5)}</div>
                    <div class="rs-val">${item.prevViews.toLocaleString()}</div>
                </div>
                <div class="rank-stat">
                    <div class="rs-label">${currentEnd.slice(5)}</div>
                    <div class="rs-val">${item.curViews.toLocaleString()}</div>
                </div>
                <div class="rank-stat">
                    <div class="rs-label">변화량</div>
                    <div class="rs-val"><span class="delta-chip ${dc}">${dPrefix}${item.delta.toLocaleString()}</span></div>
                </div>
            </div>
            <div class="growth-badge ${gc}">${gPrefix}${item.growth}%</div>
            <div class="mini-bar"><div class="mini-bar-fill ${barCls}" style="width:${barPct}%"></div></div>
            <button class="btn-detail${isActive ? ' active' : ''}" id="btn-${item.id}"
                onclick="openDetail('${item.id}')">상세</button>
        `;
        container.appendChild(card);
    });

    // 더보기 버튼 & 카운트 정보 업데이트
    const moreWrap = document.getElementById('moreWrap');
    const countInfo = document.getElementById('countInfo');
    const btnMore   = document.getElementById('btnMore');

    if (allStats.length > PAGE_SIZE) {
        moreWrap.style.display = '';
        countInfo.textContent = showAll
            ? `전체 ${allStats.length}개 표시 중`
            : `${PAGE_SIZE}개 표시 중 / 전체 ${allStats.length}개`;
        btnMore.textContent = showAll ? '접기 ▴' : `더보기 (${allStats.length - PAGE_SIZE}개 더) ▾`;
    } else {
        moreWrap.style.display = 'none';
    }
}

/* ══════════════════════════════════════════════════
   13. 상세 패널 열기
══════════════════════════════════════════════════ */
function openDetail(novelId) {
    // 이전 활성 버튼/카드 해제
    if (activeId) {
        const pb = document.getElementById('btn-' + activeId);
        const pc = document.getElementById('card-' + activeId);
        if (pb) pb.classList.remove('active');
        if (pc) pc.classList.remove('active-card');
    }
    activeId = novelId;
    const cb = document.getElementById('btn-' + novelId);
    const cc = document.getElementById('card-' + novelId);
    if (cb) cb.classList.add('active');
    if (cc) cc.classList.add('active-card');

    // 해당 소설 이력
    const history = rawData
        .filter(d => String(d.소설번호) === String(novelId))
        .sort((a, b) => new Date(normalizeDate(a.날짜)) - new Date(normalizeDate(b.날짜)));
    if (!history.length) return;

    const selectedDate = currentEnd; // 종료일 기준으로 그래프 강조
    const latestItem   = history[history.length - 1];
    const title        = latestItem.제목;
    const imgUrl       = getImageUrl(latestItem);
    const firstViews   = history[0].조회수;
    const lastViews    = latestItem.조회수;
    const totalDelta   = lastViews - firstViews;
    const totalGrowth  = firstViews === 0 ? 0
        : parseFloat(((totalDelta / firstViews) * 100).toFixed(2));

    // 선택 날짜 증감
    const selIdx = history.findIndex(d => normalizeDate(d.날짜) === selectedDate);
    let selDelta = null, selGrowth = null;
    if (selIdx > 0) {
        const sc = history[selIdx].조회수, sp = history[selIdx - 1].조회수;
        selDelta  = sc - sp;
        selGrowth = sp === 0 ? 0 : parseFloat(((selDelta / sp) * 100).toFixed(2));
    }

    // 헤더
    const coverWrap = document.getElementById('detailCoverWrap');
    coverWrap.innerHTML = imgUrl
        ? `<img class="detail-cover" src="${imgUrl}" alt="표지" referrerpolicy="no-referrer"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
           <div class="detail-cover-placeholder" style="display:none;">📖</div>`
        : `<div class="detail-cover-placeholder">📖</div>`;

    document.getElementById('detailTitle').textContent = title;

    // 작품번호: No. 없이 숫자만, 클릭 시 novelpia 링크
    const idEl = document.getElementById('detailId');
    idEl.textContent = novelId;
    idEl.href = 'https://novelpia.com/novel/' + novelId;

    // 플러스일자 배지
    const plusDateEl = document.getElementById('detailPlusDate');
    const plusRaw = latestItem['플러스일자'] || latestItem['플러스_일자'] || latestItem['plusDate'] || '';
    if (plusRaw) {
        plusDateEl.textContent = '\u2b50 플러스 ' + normalizeDate(plusRaw);
        plusDateEl.style.display = '';
    } else {
        plusDateEl.style.display = 'none';
    }

    document.getElementById('detailSub').textContent =
        `데이터 ${history.length}일 · ${normalizeDate(history[0].날짜)} ~ ${normalizeDate(latestItem.날짜)}`;

    // 메타 카드
    const tgc = totalGrowth > 0 ? 'pos' : totalGrowth < 0 ? 'neg' : '';
    const tgp = totalGrowth > 0 ? '+' : '';
    const sgc = selGrowth !== null ? (selGrowth > 0 ? 'pos' : selGrowth < 0 ? 'neg' : '') : '';
    const sgp = selGrowth !== null && selGrowth > 0 ? '+' : '';
    const sdc = selDelta  !== null ? (selDelta  > 0 ? 'pos' : selDelta  < 0 ? 'neg' : '') : '';
    const sdp = selDelta  !== null && selDelta  > 0 ? '+' : '';

    document.getElementById('detailMeta').innerHTML = `
        <div class="detail-meta-item">
            <div class="m-label">최신 조회수</div>
            <div class="m-value teal">${lastViews.toLocaleString()}</div>
        </div>
        <div class="detail-meta-item">
            <div class="m-label">전체 기간 변화량</div>
            <div class="m-value ${tgc}">${tgp}${totalDelta.toLocaleString()}</div>
        </div>
        <div class="detail-meta-item">
            <div class="m-label">전체 기간 증감률</div>
            <div class="m-value ${tgc}">${tgp}${totalGrowth}%</div>
        </div>
        <div class="detail-meta-item">
            <div class="m-label">${selectedDate} 변화량</div>
            <div class="m-value ${sdc}">${selDelta !== null ? sdp + selDelta.toLocaleString() : '—'}</div>
        </div>
        <div class="detail-meta-item">
            <div class="m-label">${selectedDate} 증감률</div>
            <div class="m-value ${sgc}">${selGrowth !== null ? sgp + selGrowth + '%' : '—'}</div>
        </div>
    `;

    // 그래프 & 일별 테이블
    renderChart(history, selectedDate);
    renderDetailTable(history, selectedDate);

    // 패널 표시 & 스크롤
    const panel = document.getElementById('detailPanel');
    panel.classList.add('visible');
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}


/* ══════════════════════════════════════════════════
   14. 상세 패널 닫기
══════════════════════════════════════════════════ */
function closeDetail() {
    if (activeId) {
        const pb = document.getElementById('btn-' + activeId);
        const pc = document.getElementById('card-' + activeId);
        if (pb) pb.classList.remove('active');
        if (pc) pc.classList.remove('active-card');
        activeId = null;
    }
    document.getElementById('detailPanel').classList.remove('visible');
}


/* ══════════════════════════════════════════════════
   15. Chart.js 차트 렌더링
   - 기존 인스턴스 반드시 destroy() 후 재생성
   - 데이터셋 1: 누적 조회수 (왼쪽 Y축)
   - 데이터셋 2: 일별 증감량 (오른쪽 Y축, 점선)
   - 선택 날짜 세로 점선 + 포인트 금색 강조
══════════════════════════════════════════════════ */
function renderChart(history, selectedDate) {
    const labels     = history.map(d => normalizeDate(d.날짜));
    const views      = history.map(d => d.조회수);
    const dailyDelta = views.map((v, i) => i === 0 ? null : v - views[i - 1]);
    const selIdx     = labels.indexOf(selectedDate);

    // ★ 기존 Chart 인스턴스 파괴
    if (myChart) { myChart.destroy(); myChart = null; }

    const ctx      = document.getElementById('viewChart').getContext('2d');
    const gradient = ctx.createLinearGradient(0, 0, 0, 300);
    gradient.addColorStop(0,   'rgba(75,192,192,0.25)');
    gradient.addColorStop(0.7, 'rgba(75,192,192,0.03)');
    gradient.addColorStop(1,   'rgba(75,192,192,0)');

    // 플러스일자 인덱스 탐색
    const plusDateRaw = history.length > 0
        ? (history[history.length-1]['플러스일자'] || history[history.length-1]['플러스_일자'] || history[history.length-1]['plusDate'] || '')
        : '';
    const plusDateStr = normalizeDate(plusDateRaw);
    const plusIdx     = plusDateStr ? labels.indexOf(plusDateStr) : -1;

    // 선택 날짜(금색 점선) + 플러스일자(별 표시) 세로선 플러그인
    const vLinePlugin = {
        id: 'vLine',
        afterDraw(chart) {
            const { ctx: c, chartArea: { top, bottom }, scales: { x } } = chart;

            // 선택 날짜 — 금색 점선
            if (selIdx >= 0) {
                const xp = x.getPixelForValue(selIdx);
                c.save();
                c.beginPath();
                c.strokeStyle = 'rgba(201,168,76,0.6)';
                c.lineWidth   = 1.5;
                c.setLineDash([4, 4]);
                c.moveTo(xp, top); c.lineTo(xp, bottom);
                c.stroke();
                c.restore();
            }

            // 플러스일자 — 별(⭐) 아이콘 + 연보라 세로선
            if (plusIdx >= 0) {
                const xp = x.getPixelForValue(plusIdx);
                c.save();
                // 세로선
                c.beginPath();
                c.strokeStyle = 'rgba(180,130,255,0.55)';
                c.lineWidth   = 1.5;
                c.setLineDash([3, 3]);
                c.moveTo(xp, top); c.lineTo(xp, bottom);
                c.stroke();
                // 상단 별 레이블
                c.setLineDash([]);
                c.fillStyle = 'rgba(180,130,255,0.9)';
                c.font = '11px sans-serif';
                c.textAlign = 'center';
                c.fillText('⭐', xp, top + 12);
                c.restore();
            }
        }
    };

    myChart = new Chart(ctx, {
        type: 'line',
        plugins: [vLinePlugin],
        data: {
            labels,
            datasets: [
                {
                    label: '조회수',
                    data: views,
                    borderColor: '#4bc0c0',
                    backgroundColor: gradient,
                    borderWidth: 2.5,
                    pointBackgroundColor: labels.map(l => l === selectedDate ? '#c9a84c' : '#4bc0c0'),
                    pointRadius:          labels.map(l => l === selectedDate ? 7 : (history.length > 30 ? 2 : 3)),
                    pointHoverRadius: 7,
                    pointBorderColor: '#0d0f14', pointBorderWidth: 2,
                    tension: 0.3, fill: true, yAxisID: 'yMain'
                },
                {
                    label: '일별 증감',
                    data: dailyDelta,
                    borderColor: 'rgba(201,168,76,0.65)',
                    backgroundColor: 'transparent',
                    borderWidth: 1.5, borderDash: [4, 4],
                    pointRadius: 0, pointHoverRadius: 4,
                    tension: 0.3, fill: false,
                    yAxisID: 'yDelta', spanGaps: false
                }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
                legend: { labels: { color: '#9aa3bc', font: { family: "'Noto Sans KR', sans-serif", size: 12 }, boxWidth: 14, padding: 16 } },
                tooltip: {
                    backgroundColor: '#1c2030', borderColor: '#343d56', borderWidth: 1,
                    titleColor: '#e8eaf0', bodyColor: '#9aa3bc', padding: 12,
                    callbacks: {
                        label(context) {
                            const val = context.parsed.y;
                            if (val === null || val === undefined) return null;
                            const sign = (context.datasetIndex === 1 && val > 0) ? '+' : '';
                            return ` ${context.dataset.label}: ${sign}${val.toLocaleString()}`;
                        }
                    }
                }
            },
            scales: {
                x: {
                    grid: { color: 'rgba(255,255,255,0.04)', drawTicks: false },
                    ticks: { color: '#5a6380', font: { size: 11 }, maxRotation: 45, maxTicksLimit: 16 }
                },
                yMain: {
                    position: 'left',
                    grid: { color: 'rgba(255,255,255,0.04)', drawTicks: false },
                    ticks: { color: '#4bc0c0', font: { size: 11 }, callback: v => v.toLocaleString() }
                },
                yDelta: {
                    position: 'right', grid: { display: false },
                    ticks: { color: 'rgba(201,168,76,0.7)', font: { size: 11 }, callback: v => (v > 0 ? '+' : '') + v.toLocaleString() }
                }
            }
        }
    });
}


/* ══════════════════════════════════════════════════
   16. 일별 데이터 테이블 렌더링
   최신 날짜 맨 위, 선택 날짜 행 강조
══════════════════════════════════════════════════ */
function renderDetailTable(history, selectedDate) {
    const tbody = document.getElementById('detailTableBody');
    tbody.innerHTML = '';

    [...history].reverse().forEach((item, ri) => {
        const origIdx  = history.length - 1 - ri;
        const dateStr  = normalizeDate(item.날짜);
        const curViews = item.조회수;
        let delta = null, growth = null;
        if (origIdx > 0) {
            const pv = history[origIdx - 1].조회수;
            delta  = curViews - pv;
            growth = pv === 0 ? 0 : parseFloat(((delta / pv) * 100).toFixed(2));
        }
        const isSelected = (dateStr === selectedDate);
        const dc  = delta  === null ? 'zer' : delta  > 0 ? 'pos' : delta  < 0 ? 'neg' : 'zer';
        const dp  = delta  !== null && delta  > 0 ? '+' : '';
        const gc2 = growth === null ? 'zer' : growth > 0 ? 'pos' : growth < 0 ? 'neg' : 'zer';
        const gp  = growth !== null && growth > 0 ? '+' : '';

        const tr = document.createElement('tr');
        if (isSelected) tr.classList.add('selected-date');
        tr.innerHTML = `
            <td>${dateStr}${isSelected ? ' <span style="font-size:10px;color:var(--accent-gold);font-weight:600;">◀</span>' : ''}</td>
            <td style="font-weight:600;">${curViews.toLocaleString()}</td>
            <td>${delta !== null ? `<span class="delta-chip ${dc}">${dp}${delta.toLocaleString()}</span>` : '<span style="color:var(--text-dim)">—</span>'}</td>
            <td>${growth !== null ? `<span class="${gc2}" style="font-weight:700;">${gp}${growth}%</span>` : '<span style="color:var(--text-dim)">—</span>'}</td>
        `;
        tbody.appendChild(tr);
    });
}


/* ══════════════════════════════════════════════════
   17. 정렬 설정 & 적용
══════════════════════════════════════════════════ */
function setSort(key) {
    // 같은 키 재클릭 시 방향 토글, 다른 키면 desc 기본
    if (sortKey === key) {
        sortDir = sortDir === 'desc' ? 'asc' : 'desc';
    } else {
        sortKey = key;
        sortDir = (key === 'title') ? 'asc' : 'desc';
    }
    applySort();
    renderRanking();
    updateSortArrows();
}

function applySort() {
    allStats.sort((a, b) => {
        let av = a[sortKey], bv = b[sortKey];
        if (sortKey === 'title') {
            av = av || ''; bv = bv || '';
            return sortDir === 'asc' ? av.localeCompare(bv, 'ko') : bv.localeCompare(av, 'ko');
        }
        return sortDir === 'asc' ? av - bv : bv - av;
    });
}

function updateSortArrows() {
    const keys = ['title', 'prevViews', 'curViews', 'delta', 'growth'];
    keys.forEach(k => {
        const el = document.getElementById('arr-' + k);
        if (!el) return;
        const btn = el.parentElement;
        if (k === sortKey) {
            el.textContent = sortDir === 'desc' ? '▼' : '▲';
            btn.classList.add('active');
        } else {
            el.textContent = '';
            btn.classList.remove('active');
        }
    });
}

/* ══════════════════════════════════════════════════
   18. 탭 전환 (그래프 ↔ 일별 데이터)
══════════════════════════════════════════════════ */
function switchTab(tabId) {
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active', (i === 0 && tabId === 'graph') || (i === 1 && tabId === 'table'));
    });
    document.getElementById('tab-graph').classList.toggle('active', tabId === 'graph');
    document.getElementById('tab-table').classList.toggle('active', tabId === 'table');
}


/* ══════════════════════════════════════════════════
   18. 날짜 정규화 (ISO → YYYY-MM-DD)
══════════════════════════════════════════════════ */
function normalizeDate(raw) {
    if (!raw) return '';
    const str = String(raw).trim();
    if (str.includes('T')) return str.slice(0, 10);
    if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;
    const dt = new Date(str);
    if (!isNaN(dt)) return dt.toISOString().slice(0, 10);
    return str;
}

// 패널 접기/펼치기
function toggleAiPanel() {
    const body   = document.getElementById('aiPanelBody');
    const toggle = document.getElementById('aiToggleIcon');
    const isOpen = body.style.display !== 'none';
    body.style.display   = isOpen ? 'none' : '';
    toggle.textContent   = isOpen ? '▼' : '▲';
    toggle.classList.toggle('open', !isOpen);
}

// 소스에 저장된 Groq 키 사용
function loadAiKey() {
    const ok = GROQ_API_KEY && !GROQ_API_KEY.includes('여기에');
    const statusEl = document.getElementById('aiKeyStatus');
    if (ok) {
        statusEl.textContent = GROQ_MODEL + ' · 준비됨';
        statusEl.classList.add('ok');
    } else {
        statusEl.textContent = '키 미설정 — 소스의 GROQ_API_KEY를 채워주세요';
        statusEl.style.color = 'var(--accent-rose)';
    }
}

function getAiKey() {
    return GROQ_API_KEY;
}

// 빠른 질문 버튼
function quickAiQuery(text) {
    document.getElementById('aiQueryInput').value = text;
    sendAiQuery();
}

// 채팅 메시지 추가
function addAiMsg(role, html) {
    const area = document.getElementById('aiChatArea');
    const div  = document.createElement('div');
    div.className = 'ai-msg ' + role;
    div.innerHTML = html;
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
    return div;
}

// AI 질문 전송
async function sendAiQuery() {
    const input = document.getElementById('aiQueryInput');
    const query = input.value.trim();
    if (!query) return;

    const key = getAiKey();
    if (!key || key.includes('여기에')) {
        addAiMsg('err', '🔑 소스 상단 GROQ_API_KEY에 발급받은 키를 입력해주세요.');
        return;
    }
    if (!novelGroups) {
        addAiMsg('err', '⏳ 데이터 로딩 후 사용하세요.');
        return;
    }

    // 사용자 메시지 표시
    addAiMsg('user', query);
    input.value = '';

    // 로딩 메시지
    const loadEl = addAiMsg('ai', '<span class="dot-flashing"></span>');
    document.getElementById('aiSendBtn').disabled = true;

    // 데이터 컨텍스트 구성
    const dates      = [...new Set(rawData.map(d => normalizeDate(d.날짜)))].filter(Boolean).sort();
    const novelCount = Object.keys(novelGroups).length;
    const latestDate = dates[dates.length - 1];
    const oldestDate = dates[0];

    const systemPrompt = `당신은 소설 통계 대시보드의 데이터 분석 AI입니다.
현재 데이터: 소설 ${novelCount}개, 기간 ${oldestDate} ~ ${latestDate} (최신: ${latestDate})
데이터 컬럼: 소설번호, 제목, 날짜(YYYY-MM-DD), 조회수(누적)

사용자 질문에 맞는 액션 JSON 하나만 반환하세요 (JSON만, 다른 텍스트 없이):

N일간 조회수 증가량 랭킹:
{"action":"multi_day_growth","days":7,"limit":10,"sortBy":"delta","message":"한국어 설명"}
(sortBy: delta=증가량순 / growth=증감률순)

특정 날짜 기준 랭킹:
{"action":"date_ranking","date":"YYYY-MM-DD","sortBy":"growth","limit":10,"message":"한국어 설명"}
(sortBy: growth=증감률 / delta=변화량 / curViews=당일조회수)

최신 조회수 Top N:
{"action":"top_views","limit":10,"message":"한국어 설명"}

하락 Top N (최신 날짜 기준):
{"action":"declining","limit":10,"message":"한국어 설명"}

제목에 특정 키워드 포함된 소설만 필터:
{"action":"filter_keyword","keyword":"로판","message":"한국어 설명"}

특정 소설 제목으로 상세 조회 (일별 그래프 표시):
{"action":"show_novel_detail","keyword":"일진녀","message":"한국어 설명"}

특정 날짜/기간으로 변경 (date는 YYYY-MM-DD):
{"action":"date_ranking","date":"2026-03-03","sortBy":"growth","message":"한국어 설명"}

단순 답변 (화면 변경 없음):
{"action":"answer","message":"한국어 답변"}

message는 한국어로, 어떤 데이터를 표시했는지 간결하게 설명하세요. 반드시 JSON만 반환하고 다른 텍스트는 절대 쓰지 마세요.`;

    try {
        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${key}`
            },
            body: JSON.stringify({
                model: GROQ_MODEL,
                max_tokens: 300,
                temperature: 0,
                messages: [
                    { role: 'system', content: systemPrompt },
                    { role: 'user',   content: query }
                ]
            })
        });

        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error?.message || `HTTP ${res.status}`);
        }

        const data    = await res.json();
        const rawText = data.choices[0].message.content.trim();

        // JSON 파싱 — Groq이 앞뒤에 텍스트를 붙이는 경우를 대비해 {} 블록만 추출
        const jsonMatch = rawText.match(/\{[\s\S]*\}/);
        if (!jsonMatch) throw new Error(`AI 응답을 파싱할 수 없습니다: ${rawText.slice(0,80)}`);
        const action = JSON.parse(jsonMatch[0]);

        loadEl.remove();
        executeAiAction(action);

    } catch (err) {
        loadEl.innerHTML = `오류: ${err.message}`;
        loadEl.classList.add('err');
        loadEl.classList.remove('ai');
    } finally {
        document.getElementById('aiSendBtn').disabled = false;
    }
}

// AI 액션 실행
function executeAiAction(action) {
    const tag = (label) => `<span class="tag">${label}</span>`;

    switch (action.action) {
        case 'multi_day_growth': {
            const days  = Number(action.days)  || 7;
            const limit = Number(action.limit) || 10;
            const by    = action.sortBy === 'growth' ? 'growth' : 'delta';
            const stats = calcMultiDayStats(days);
            stats.sort((a, b) => b[by] - a[by]);
            allStats   = stats;
            showAll    = limit >= stats.length;
            applyAiFilter(`🤖 최근 ${days}일 ${by === 'growth' ? '증감률' : '증가량'} 기준 Top ${limit}`);
            renderRanking();
            addAiMsg('ai', tag('화면변경') + (action.message || `최근 ${days}일 조회수 증가 Top ${limit}`));
            break;
        }
        case 'date_ranking': {
            // 특정 날짜 또는 기간으로 이동
            const endDate   = action.date || action.endDate || currentEnd;
            const startDate = action.startDate || endDate; // 날짜 하나면 전일 비교
            document.getElementById('startDateInput').value = startDate;
            document.getElementById('endDateInput').value   = endDate;
            const by = { growth:'growth', delta:'delta', curViews:'curViews' }[action.sortBy] || 'growth';
            sortKey = by; sortDir = 'desc';
            applyAiFilter(`🤖 ${startDate} ~ ${endDate} ${by === 'growth' ? '증감률' : by === 'delta' ? '변화량' : '조회수'} 순`);
            onRangeChange(true);
            updateSortArrows();
            addAiMsg('ai', tag('화면변경') + (action.message || `${endDate} 기준 랭킹`));
            break;
        }
        case 'top_views': {
            const limit = Number(action.limit) || 10;
            allStats = calcRangeStats(currentStart, currentEnd);
            sortKey  = 'curViews'; sortDir = 'desc';
            applySort();
            applyAiFilter(`🤖 현재 기간 기준 조회수 Top ${limit}`);
            renderRanking();
            updateSortArrows();
            addAiMsg('ai', tag('화면변경') + (action.message || `최신 조회수 Top ${limit}`));
            break;
        }
        case 'declining': {
            const limit = Number(action.limit) || 10;
            allStats = calcRangeStats(currentStart, currentEnd);
            allStats.sort((a, b) => a.delta - b.delta);
            applyAiFilter(`🤖 현재 기간 기준 하락 Top ${limit}`);
            renderRanking();
            addAiMsg('ai', tag('화면변경') + (action.message || `하락 Top ${limit}`));
            break;
        }
        case 'filter_keyword': {
            const kw = action.keyword || '';
            if (!kw) { addAiMsg('ai', '검색할 키워드를 인식하지 못했습니다.'); break; }
            const base     = calcRangeStats(currentStart, currentEnd);
            const filtered = base.filter(s => s.title && s.title.includes(kw));
            if (filtered.length === 0) {
                addAiMsg('ai', `"${kw}"이(가) 포함된 소설이 없습니다.`);
                break;
            }
            allStats = filtered;
            showAll  = true;
            applyAiFilter(`🤖 제목에 "${kw}" 포함된 소설 ${filtered.length}개`);
            renderRanking();
            addAiMsg('ai', tag('화면변경') + (action.message || `"${kw}" 포함 소설 ${filtered.length}개 표시`));
            break;
        }
        case 'show_novel_detail': {
            // 제목 키워드로 소설 찾아서 상세 패널 열기
            const keyword = action.keyword || action.title || '';
            if (!keyword) { addAiMsg('ai', '소설 제목을 인식하지 못했습니다.'); break; }
            const found = rawData.find(d => d.제목 && d.제목.includes(keyword));
            if (!found) {
                addAiMsg('ai', `"${keyword}"과(와) 일치하는 소설을 찾지 못했습니다.`);
                break;
            }
            const novelId = String(found.소설번호);
            // allStats에 없으면 전체 통계에서 찾아 추가
            if (!allStats.find(s => s.id === novelId)) {
                const full = calcRangeStats(currentStart, currentEnd);
                allStats = full;
                showAll  = true;
                applySort();
                renderRanking();
            }
            openDetail(novelId);
            addAiMsg('ai', tag('화면변경') + (action.message || `"${found.제목}" 상세 정보를 표시합니다.`));
            break;
        }
        case 'answer':
        default:
            addAiMsg('ai', action.message || '분석 결과를 찾지 못했습니다.');
            break;
    }
}

// AI 필터 배너 표시

    bar.classList.add('on');

}

function resetAiFilter() {
    aiFilterOn = false;
    document.getElementById('aiFilterBar').classList.remove('on');
    onRangeChange(false); // 현재 기간 기준으로 복원
}

// 종료일 반환
function getLatestDate() {
    return currentEnd || document.getElementById('endDateInput')?.value || '';
}

// N일간 누적 증가량 계산 (소설별)
function calcMultiDayStats(days) {
    const stats = [];
    for (const id in novelGroups) {
        const list = novelGroups[id];
        if (list.length < 2) continue;

        const latest     = list[list.length - 1];
        const latestDate = new Date(normalizeDate(latest.날짜));
        const targetDate = new Date(latestDate);
        targetDate.setDate(targetDate.getDate() - days);

        // targetDate 이전 가장 가까운 데이터 찾기
        let base = list[0];
        for (let i = list.length - 2; i >= 0; i--) {
            if (new Date(normalizeDate(list[i].날짜)) <= targetDate) {
                base = list[i]; break;
            }
        }

        const curViews  = latest.조회수;
        const prevViews = base.조회수;
        const delta     = curViews - prevViews;
        const growth    = prevViews === 0 ? 0 : parseFloat(((delta / prevViews) * 100).toFixed(2));

        stats.push({
            id, title: latest.제목,
            growth, delta, curViews, prevViews,
            imgUrl: getImageUrl(latest),
            history: list
        });
    }
    return stats;
}
